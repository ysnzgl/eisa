# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
# E-İSA Kiosk Demo — Rancher / Kubernetes Deployment
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
#
# Birleşik kiosk container'ı (API Node + UI) demo.eisa.com.tr üzerinden yayınlar.
# Image: kiosk_edge/Dockerfile çıktısı (Nginx :80 + Node 8765 + supervisord)
#
# Build & push:
#   cd kiosk_edge
#   docker build -t ghcr.io/ysnzgl/eisa-kiosk:1.0.0 .
#   docker push ghcr.io/ysnzgl/eisa-kiosk:1.0.0
#
# Apply:
#   kubectl apply -f deploy/eisa-kiosk-demo.yaml
#
# NOT: Sadece demo amaçlıdır. Gerçek kiosk'lar fiziksel cihazda native çalışır.
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
apiVersion: v1
kind: Namespace
metadata:
  name: eisa-kiosk-demo
  labels:
    app.kubernetes.io/part-of: eisa
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: eisa-kiosk-demo-config
  namespace: eisa-kiosk-demo
data:
  NODE_ENV: "production"

  # Node API ortam değişkenleri (container içi)
  EISA_PORT: "8765"
  EISA_HOST: "127.0.0.1"
  EISA_SQLITE_PATH: "/var/lib/eisa/local.db"
  EISA_MEDIA_DIR: "/var/lib/eisa/media"
  EISA_LOG_DIR: "/var/log/eisa"

  # Merkezi backend API endpoint
  EISA_CENTRAL_API_BASE: "https://api.eisa.com.tr"

  # Demo kiosk kimlik bilgileri (legacy AppKey — opsiyonel)
  # NOT: Gerçek production'da her kiosk'un unique MAC ve key'i olmalı.
  EISA_KIOSK_APP_KEY: "demo-kiosk-key"
  EISA_KIOSK_MAC: "00:00:00:00:00:00"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: eisa-kiosk-demo
  namespace: eisa-kiosk-demo
  labels:
    app.kubernetes.io/name: eisa-kiosk-demo
    app.kubernetes.io/part-of: eisa
spec:
  replicas: 1
  revisionHistoryLimit: 5
  selector:
    matchLabels:
      app.kubernetes.io/name: eisa-kiosk-demo
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  template:
    metadata:
      labels:
        app.kubernetes.io/name: eisa-kiosk-demo
        app.kubernetes.io/part-of: eisa
    spec:
      automountServiceAccountToken: false
      imagePullSecrets:
        - name: eisa-regcred
      securityContext:
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: kiosk
          image: ghcr.io/ysnzgl/eisa-kiosk:1.0.0
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 80
              protocol: TCP
          envFrom:
            - configMapRef:
                name: eisa-kiosk-demo-config
          volumeMounts:
            - name: kiosk-data
              mountPath: /var/lib/eisa
            - name: kiosk-logs
              mountPath: /var/log/eisa
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 15
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 6
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 40
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 5
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false
            capabilities:
              drop:
                - ALL
              add:
                - CHOWN
                - SETUID
                - SETGID
                - NET_BIND_SERVICE
          resources:
            requests:
              cpu: "100m"
              memory: "192Mi"
            limits:
              cpu: "750m"
              memory: "512Mi"
      volumes:
        # Demo için emptyDir yeterli — veriler backend'den pull edilir.
        # Kalıcı saklama gerekirse aşağıdaki PVC alternatifini kullanın.
        - name: kiosk-data
          emptyDir: {}
        - name: kiosk-logs
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: eisa-kiosk-demo
  namespace: eisa-kiosk-demo
  labels:
    app.kubernetes.io/name: eisa-kiosk-demo
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: eisa-kiosk-demo
  ports:
    - name: http
      port: 80
      targetPort: http
      protocol: TCP
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: eisa-kiosk-demo
  namespace: eisa-kiosk-demo
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
    traefik.ingress.kubernetes.io/router.entrypoints: websecure
    traefik.ingress.kubernetes.io/router.tls: "true"
spec:
  ingressClassName: traefik
  tls:
    - hosts:
        - demo.eisa.com.tr
      secretName: eisa-kiosk-demo-tls
  rules:
    - host: demo.eisa.com.tr
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: eisa-kiosk-demo
                port:
                  number: 80
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
# (Opsiyonel) Kalıcı SQLite saklama — PVC alternatifi
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
# Demo verisi backend'den pull edildiği için emptyDir yeterlidir.
# Kalıcı saklama isteniyorsa:
#   1) Aşağıdaki PVC'yi etkinleştirin
