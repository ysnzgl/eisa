# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
# E-İSA Kiosk Demo — Rancher / Kubernetes Deployment
# Namespace: eisa-app
# Host: demo.eisa.com.tr
#
# Build & push:
#   cd kiosk_edge
#   docker build -t ghcr.io/ysnzgl/eisa-kiosk:1.
#   docker push ghcr.io/ysnzgl/eisa-kiosk:1
#
# Apply:
#   kubectl apply -f eisa-kiosk-demo.yaml
#
# Durum:
#   kubectl -n eisa-app rollout status deployment/eisa-kiosk-demo
#   kubectl -n eisa-app get pods -l app.kubernetes.io/name=eisa-kiosk-demo
#   kubectl -n eisa-app logs -f deployment/eisa-kiosk-demo
#
# NOT:
# - eisa-app namespace'inde eisa-regcred secret'ının mevcut olduğu varsayılır.
# - Bu deployment yalnızca web üzerinden erişilen demo kiosk içindir.
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

apiVersion: v1
kind: Namespace
metadata:
  name: eisa-app
  labels:
    app.kubernetes.io/part-of: eisa

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: eisa-kiosk-demo-config
  namespace: eisa-app
  labels:
    app.kubernetes.io/name: eisa-kiosk-demo
    app.kubernetes.io/part-of: eisa
data:
  NODE_ENV: "production"

  # Container içindeki Node API
  EISA_PORT: "8765"
  EISA_HOST: "127.0.0.1"

  # Yerel veri ve log yolları
  EISA_SQLITE_PATH: "/var/lib/eisa/local.db"
  EISA_MEDIA_DIR: "/var/lib/eisa/media"
  EISA_LOG_DIR: "/var/log/eisa"

  # Merkezi E-İSA API
  EISA_CENTRAL_API_BASE: "https://api.eisa.com.tr"

---
apiVersion: v1
kind: Secret
metadata:
  name: eisa-kiosk-demo-secrets
  namespace: eisa-app
  labels:
    app.kubernetes.io/name: eisa-kiosk-demo
    app.kubernetes.io/part-of: eisa
type: Opaque
stringData:
  EISA_KIOSK_FLEET_KEY: "BObKjG26RAaEAmDdADTfmv_rIoyPKzAuQ_hzF5qUE3ahX4fvuTDCh0IsEfycdX_C"
  EISA_KIOSK_PROVISIONING_SECRET: "P0S59KUHwlarznDOUAGGUT5RdC-4xymN23YhguZGhBvGvqP1L3eWGzmbMO7DR_xTMtPMZDWn0N83_jdvj55Vow"

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: eisa-kiosk-demo
  namespace: eisa-app
  labels:
    app.kubernetes.io/name: eisa-kiosk-demo
    app.kubernetes.io/component: kiosk
    app.kubernetes.io/part-of: eisa
spec:
  replicas: 1
  revisionHistoryLimit: 5
  selector:
    matchLabels:
      app.kubernetes.io/name: eisa-kiosk-demo
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  template:
    metadata:
      labels:
        app.kubernetes.io/name: eisa-kiosk-demo
        app.kubernetes.io/component: kiosk
        app.kubernetes.io/part-of: eisa
    spec:
      automountServiceAccountToken: false
      imagePullSecrets:
        - name: eisa-regcred
      securityContext:
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: kiosk
          image: ghcr.io/ysnzgl/eisa-kiosk:1.0.2
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 80
              protocol: TCP
          envFrom:
            - configMapRef:
                name: eisa-kiosk-demo-config
            - secretRef:
                name: eisa-kiosk-demo-secrets
          volumeMounts:
            - name: kiosk-data
              mountPath: /var/lib/eisa
            - name: kiosk-logs
              mountPath: /var/log/eisa
          startupProbe:
            httpGet:
              path: /healthz
              port: http
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 18
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 6
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 5
          securityContext:
            runAsUser: 0
            runAsGroup: 0
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false
            capabilities:
              drop:
                - ALL
              add:
                - CHOWN
                - DAC_OVERRIDE
                - SETUID
                - SETGID
                - NET_BIND_SERVICE
          resources:
            requests:
              cpu: "100m"
              memory: "192Mi"
            limits:
              cpu: "750m"
              memory: "512Mi"
      volumes:
        # Demo ortamında Pod yeniden oluşturulduğunda SQLite ve medya silinir.
        - name: kiosk-data
          emptyDir: {}
        - name: kiosk-logs
          emptyDir: {}

---
apiVersion: v1
kind: Service
metadata:
  name: eisa-kiosk-demo
  namespace: eisa-app
  labels:
    app.kubernetes.io/name: eisa-kiosk-demo
    app.kubernetes.io/part-of: eisa
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: eisa-kiosk-demo
  ports:
    - name: http
      port: 80
      targetPort: http
      protocol: TCP

---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: eisa-kiosk-demo
  namespace: eisa-app
  labels:
    app.kubernetes.io/name: eisa-kiosk-demo
    app.kubernetes.io/part-of: eisa
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
    traefik.ingress.kubernetes.io/router.entrypoints: websecure
    traefik.ingress.kubernetes.io/router.tls: "true"
spec:
  ingressClassName: traefik
  tls:
    - hosts:
        - demo.eisa.com.tr
      secretName: eisa-kiosk-demo-tls
  rules:
    - host: demo.eisa.com.tr
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: eisa-kiosk-demo
                port:
                  number: 80

# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
# Opsiyonel PVC
#
# SQLite ve medya Pod değişimlerinde korunacaksa:
# 1. Aşağıdaki PVC kaynağını etkinleştir.
# 2. Deployment içindeki kiosk-data emptyDir tanımını kaldır.
# 3. Yerine şunu ekle:
#
#   - name: kiosk-data
#     persistentVolumeClaim:
#       claimName: eisa-kiosk-demo-data
#
# SQLite + tek PVC kullanıldığında Deployment strategy için Recreate daha
# güvenlidir:
#
# strategy:
#   type: Recreate
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
#
# ---
# apiVersion: v1
# kind: PersistentVolumeClaim
# metadata:
#   name: eisa-kiosk-demo-data
#   namespace: eisa-app
# spec:
#   accessModes:
#     - ReadWriteOnce
#   resources:
#     requests:
#       storage: 1Gi
