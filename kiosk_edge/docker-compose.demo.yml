# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
# E-İSA Kiosk Edge — Demo Docker Compose (All-in-One)
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
#
# Bu compose dosyası demo.eisa.com.tr için hazırlanmıştır.
# API Node ve UI tek container içinde birlikte çalışır.
#
# Kullanım:
#   docker compose -f docker-compose.demo.yml up -d
#
# Container içi mimari:
#   - Nginx (:80)  → UI static + /api proxy
#   - Node API (127.0.0.1:8765, internal)
#   - supervisord ile iki process yönetilir
#
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

version: '3.8'

services:
  # ── Kiosk (API + UI birleşik) ──
  kiosk:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: eisa-kiosk-demo
    restart: unless-stopped
    ports:
      - "8080:80"
    environment:
      NODE_ENV: production
      # Node API ortam değişkenleri
      EISA_PORT: 8765
      EISA_HOST: 127.0.0.1
      EISA_SQLITE_PATH: /var/lib/eisa/local.db
      EISA_MEDIA_DIR: /var/lib/eisa/media
      # Loglama — JSON stdout (Kubernetes Alloy uyumlu). Detay: docs/operations/logging.md
      LOG_LEVEL: info
      LOG_FORMAT: json
      SERVICE_NAME: eisa-kiosk-api
      APP_ENV: production
      APP_VERSION: 1.0.2
      # Backend API endpoint (merkezi sunucu)
      EISA_CENTRAL_API_BASE: ${BACKEND_URL:-https://api.eisa.com.tr}
      # Demo kiosk kimlik bilgileri (legacy AppKey — opsiyonel)
      EISA_KIOSK_APP_KEY: ${KIOSK_APP_KEY:-demo-kiosk-key}
      EISA_KIOSK_MAC: ${KIOSK_MAC:-00:00:00:00:00:00}
    volumes:
      # Yalnizca SQLite + medya persistence; log dosyasi tutulmaz.
      - kiosk-data:/var/lib/eisa
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost/healthz"]
      interval: 30s
      timeout: 5s
      start_period: 15s
      retries: 3

# ── Volumes ──
volumes:
  kiosk-data:
    driver: local
