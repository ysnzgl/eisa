server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  # Güvenlik başlıkları
  add_header X-Frame-Options "DENY" always;
  add_header X-Content-Type-Options "nosniff" always;
  add_header Referrer-Policy "strict-origin-when-cross-origin" always;
  add_header Permissions-Policy "geolocation=(), microphone=(), camera=(self)" always;
  add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
  # CSP — Vue üretim build'i hash'li olabilir; gerekirse 'self' yeterlidir
  add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; font-src 'self' data:; connect-src 'self' https:; frame-ancestors 'none'; base-uri 'self'; form-action 'self'; object-src 'none'" always;

  # Gizli/sistem dosyalarını engelle
  location ~ /\.(?!well-known) {
    deny all;
  }

  location / {
    try_files $uri $uri/ /index.html;
  }

  # Statik varlıklar uzun süreli cache
  location ~* \.(?:css|js|woff2?|ttf|eot|svg|png|jpg|jpeg|gif|webp|ico)$ {
    expires 30d;
    add_header Cache-Control "public, immutable";
  }
}
