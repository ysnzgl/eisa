server {
  listen 8080;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  # Güvenlik başlıkları
  add_header X-Frame-Options "DENY" always;
  add_header X-Content-Type-Options "nosniff" always;
  add_header Referrer-Policy "strict-origin-when-cross-origin" always;
  add_header Permissions-Policy "geolocation=(), microphone=(), camera=(self)" always;
  add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
  # TODO: Inline style kullanımını kaldırınca style-src ve style-src-elem içinden 'unsafe-inline' kaldır.
  add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; style-src-elem 'self' 'unsafe-inline'; font-src 'self' data:; img-src 'self' data: blob:; connect-src 'self' https://api.eisa.com.tr; object-src 'none'; base-uri 'self'; frame-ancestors 'none'" always;

  # Gizli/sistem dosyalarını engelle
  location ~ /\.(?!well-known) {
    deny all;
  }

  location / {
    try_files $uri $uri/ /index.html;
  }

  location = /healthz {
    default_type text/plain;
    return 200 "ok\n";
  }

  location = /config.js {
    try_files /config.js =404;
    expires -1;
    add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate, max-age=0" always;
  }

  location = /favicon.ico {
    access_log off;
    log_not_found off;
    try_files /favicon.ico =404;
    expires 30d;
    add_header Cache-Control "public, immutable";
  }

  # Statik varlıklar uzun süreli cache
  location ~* \.(?:css|js|woff2?|ttf|eot|svg|png|jpg|jpeg|gif|webp|ico)$ {
    expires 30d;
    add_header Cache-Control "public, immutable";
  }
}
